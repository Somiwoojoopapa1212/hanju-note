<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주향 노트 그래픽 이미지 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { background:#0a1628; color:#a8d4f8; font-family:'Noto Sans KR',sans-serif; padding:32px; text-align:center; }
  h2 { margin-bottom:8px; }
  p  { color:#4a6a8a; font-size:14px; margin-bottom:24px; }
  button { margin:8px; padding:12px 28px; background:#4a8bc4; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px; font-family:inherit; }
  button:hover { background:#2c6ba3; }
  canvas { border:2px solid #1a2a4a; display:block; margin:24px auto; max-width:100%; }
</style>
</head>
<body>
<h2>🍶 주향 노트 — 그래픽 이미지 생성기</h2>
<p>아래 버튼을 클릭하면 1024×500 PNG 파일이 다운로드됩니다.</p>
<button onclick="download()">⬇️ 그래픽 이미지 다운로드 (1024×500)</button>
<br>
<canvas id="c" width="1024" height="500"></canvas>

<script>
const FONT = "'Noto Sans KR', -apple-system, sans-serif";

function draw() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 1024, H = 500;

  // ── 배경 ──
  const bg = ctx.createRadialGradient(300, 250, 0, 300, 250, 700);
  bg.addColorStop(0, '#0e2540');
  bg.addColorStop(0.6, '#0a1628');
  bg.addColorStop(1, '#050d1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── 장식 원 ──
  [[150, 120, 220, 0.07], [900, 380, 180, 0.05], [600, 500, 120, 0.04]].forEach(([x,y,r,a]) => {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(74,139,196,${a})`; ctx.fill();
  });

  // ── 구분선 ──
  ctx.beginPath(); ctx.moveTo(500, 50); ctx.lineTo(500, 450);
  ctx.strokeStyle = 'rgba(74,139,196,0.25)'; ctx.lineWidth = 1; ctx.stroke();

  // ── 왼쪽: 앱 정보 ──
  // 아이콘 배경
  ctx.beginPath(); ctx.arc(130, 155, 62, 0, Math.PI*2);
  const iconBg = ctx.createRadialGradient(130,155,0,130,155,62);
  iconBg.addColorStop(0,'rgba(74,139,196,0.35)');
  iconBg.addColorStop(1,'rgba(74,139,196,0.05)');
  ctx.fillStyle = iconBg; ctx.fill();

  // 이모지
  ctx.font = '68px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🍶', 130, 175);

  // 앱 이름
  ctx.textAlign = 'left';
  ctx.font = `900 58px ${FONT}`;
  ctx.fillStyle = '#a8d4f8';
  ctx.fillText('주향 노트', 70, 265);

  // 일본어 부제
  ctx.font = `400 20px ${FONT}`;
  ctx.fillStyle = 'rgba(74,139,196,0.8)';
  ctx.fillText('酒香ノート', 72, 298);

  // 구분 선
  ctx.beginPath(); ctx.moveTo(72, 318); ctx.lineTo(420, 318);
  ctx.strokeStyle = 'rgba(74,139,196,0.3)'; ctx.lineWidth = 1; ctx.stroke();

  // 슬로건
  ctx.font = `400 19px ${FONT}`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('막걸리부터 다이긴조까지', 72, 348);
  ctx.fillText('일본주·한국전통주 시음 기록 앱', 72, 374);

  // ── 오른쪽: 기능 목록 ──
  const features = [
    ['🍶', '16종 술 지원', '한국전통주·일본주·기타 직접입력'],
    ['📝', '향미 프로필', '달콤·산미·감칠맛·과일향 레이더 차트'],
    ['📊', '통계 분석', '카테고리·지역별 취향 리포트'],
    ['👥', '다른 사람 통계', '익명 시음 데이터 커뮤니티 공유'],
  ];

  let fy = 72;
  features.forEach(([emoji, title, desc]) => {
    // 아이콘 배경
    ctx.beginPath(); ctx.arc(548, fy+22, 22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(74,139,196,0.15)'; ctx.fill();

    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillText(emoji, 548, fy+30);

    ctx.textAlign = 'left';
    ctx.font = `700 21px ${FONT}`;
    ctx.fillStyle = '#a8d4f8';
    ctx.fillText(title, 584, fy+22);

    ctx.font = `400 15px ${FONT}`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(desc, 584, fy+44);

    // 항목 구분선
    if (fy < 350) {
      ctx.beginPath(); ctx.moveTo(524, fy+68); ctx.lineTo(980, fy+68);
      ctx.strokeStyle='rgba(74,139,196,0.12)'; ctx.lineWidth=1; ctx.stroke();
    }
    fy += 88;
  });

  // ── 하단 워터마크 ──
  ctx.font = `400 13px ${FONT}`;
  ctx.fillStyle = 'rgba(74,139,196,0.35)';
  ctx.textAlign = 'right';
  ctx.fillText('somiwoojoopapa1212.github.io/hanju-note', W-24, H-18);
}

function download() {
  document.fonts.ready.then(() => {
    draw();
    const a = document.createElement('a');
    a.download = 'hanju-note-feature-graphic.png';
    a.href = document.getElementById('c').toDataURL('image/png');
    a.click();
  });
}

document.fonts.ready.then(draw);
</script>
</body>
</html>
